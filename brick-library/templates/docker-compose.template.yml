version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=erpdb
      - POSTGRES_USER=erpuser
      - POSTGRES_PASSWORD=erppassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      - PORT=3000
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=erpdb
      - PGUSER=erpuser
      - PGPASSWORD=erppassword
    command: sh -c "npm run migrate && npm start"

volumes:
  postgres_data:

