# =====================================================
# CustomERP - Production Docker Compose
# =====================================================
# Usage:
#   cp .env.production.example .env   # fill in real values
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml down
#   docker compose -f docker-compose.prod.yml logs -f
# =====================================================

services:
  # ─────────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: customwerp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-customwerp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - customwerp-network
    restart: always
    mem_limit: 512m
    memswap_limit: 768m

  # ─────────────────────────────────────────────────
  # Backend API (Node.js/Express)
  # ─────────────────────────────────────────────────
  backend:
    build:
      context: ./platform/backend
      dockerfile: Dockerfile
    container_name: customwerp-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-customwerp}
      JWT_SECRET: ${JWT_SECRET}
      AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://ai-gateway:8000}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-support@example.com}
      ASSEMBLER_PATH: /app/assembler
      BRICK_LIBRARY_PATH: /app/brick-library
    expose:
      - "3000"
    volumes:
      - ./platform/assembler:/app/assembler:ro
      - ./brick-library:/app/brick-library:ro
    depends_on:
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    networks:
      - customwerp-network
    restart: always
    mem_limit: 1536m
    memswap_limit: 2g

  # ─────────────────────────────────────────────────
  # Frontend (React served by Nginx)
  # ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./platform/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: customwerp-frontend
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - customwerp-network
    restart: always
    mem_limit: 128m
    memswap_limit: 256m

  # ─────────────────────────────────────────────────
  # AI Gateway (Python/FastAPI)
  # ─────────────────────────────────────────────────
  ai-gateway:
    build:
      context: ./platform/ai-gateway
      dockerfile: Dockerfile
    container_name: customwerp-ai-gateway
    env_file:
      - .env
    environment:
      PORT: 8000
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - training_data:/app/training_data
    expose:
      - "8000"
    networks:
      - customwerp-network
    restart: always
    mem_limit: 768m
    memswap_limit: 1g

  # ─────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: customwerp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - customwerp-network
    restart: always
    mem_limit: 128m
    memswap_limit: 256m

  # ─────────────────────────────────────────────────
  # Certbot (Let's Encrypt certificate management)
  # ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: customwerp-certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - customwerp-network
    restart: always

networks:
  customwerp-network:
    driver: bridge

volumes:
  postgres_data:
  training_data:
  certbot_webroot:
  certbot_certs:
