# =====================================================
# CustomERP - Production Nginx Configuration
# =====================================================
# Two-phase setup:
#   Phase 1: No SSL certs yet — serves everything on HTTP (port 80)
#            and exposes ACME challenge for certbot.
#   Phase 2: After certs exist, uncomment the HTTPS server block
#            below and restart nginx.
#
# To obtain certs (run once after DNS points to this server):
#   docker compose -f docker-compose.prod.yml exec certbot \
#     certbot certonly --webroot -w /var/www/certbot \
#     -d customerp.site -d www.customerp.site \
#     --email admin@customerp.site --agree-tos --no-eff-email
#
# Then uncomment the HTTPS block, comment out the HTTP proxy
# locations, and restart:
#   docker compose -f docker-compose.prod.yml restart nginx
# =====================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-font-ttf
               font/opentype image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Upstream backends
    upstream backend_upstream {
        server backend:3000;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    # ─────────────────────────────────────────────────
    # HTTP server — serves the app + ACME challenge
    # ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name customerp.site www.customerp.site _;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Frontend (React SPA)
        location / {
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ERP Preview proxy
        location /preview/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Health check
        location /health {
            proxy_pass http://backend_upstream/health;
            proxy_http_version 1.1;
        }
    }

    # ─────────────────────────────────────────────────
    # HTTPS — uncomment AFTER certbot obtains certs
    # ─────────────────────────────────────────────────
